stages:
  - build
  - mirror

build-image:
  stage: build
  tags:
    - build-node
  timeout: 3h
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - |
      docker build \
        --cache-from $CI_REGISTRY_IMAGE:latest \
        -t $CI_REGISTRY_IMAGE:latest \
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        .
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - |
      curl -s -X POST http://hooks.theochinomona.tech/deploy/hermes-agent \
        -H "X-Gitlab-Token: $DEPLOY_WEBHOOK_SECRET" \
        -H "Content-Type: application/json" \
        -d "{\"ref\":\"refs/heads/main\",\"after\":\"$CI_COMMIT_SHA\"}"
  after_script:
    - docker logout $CI_REGISTRY

mirror-to-github:
  stage: mirror
  tags:
    - build-node
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - git remote add github https://TheophilusChinomona:${GITHUB_MIRROR_TOKEN}@github.com/TheophilusChinomona/hermes-agent.git
    - git push github HEAD:main
